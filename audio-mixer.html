<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EAIM 오디오 믹서</title>
<style>
:root{--bg:#0a0a0f;--panel:#13131a;--panel2:#1a1a24;--border:#2a2a3a;--led-off:#1a1a1a;--gold:#f5c842;--blue:#4fc3f7;--green:#69f0ae;--red:#ff5252;--purple:#ce93d8;--orange:#ffb74d;--text:#e0e0e0;--subtext:#888}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Courier New',monospace;background:var(--bg);color:var(--text);min-height:100vh;background-image:radial-gradient(ellipse at 20% 0%,#1a0a2a44 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,#0a1a2a44 0%,transparent 50%)}
header{background:linear-gradient(90deg,#0d0d14,#1a0a2a,#0d0d14);border-bottom:1px solid #2a1a4a;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
.logo-area{display:flex;align-items:center;gap:12px}
.logo-text{font-size:16px;font-weight:700;color:var(--gold);letter-spacing:2px}
.logo-sub{font-size:10px;color:var(--subtext);letter-spacing:3px;margin-top:2px}
.master-vol-area{display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.master-label{font-size:10px;color:var(--gold);letter-spacing:2px}
.vu-master{display:flex;gap:2px;align-items:flex-end}
.vu-bar{width:5px;border-radius:2px;transition:height .08s,background .08s;background:var(--green)}
#ai-preset-banner{background:linear-gradient(135deg,#1a0a2a,#0a1a2a,#0a2a1a);border-bottom:1px solid #3a2a5a;padding:10px 24px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.ai-banner-label{font-size:10px;color:var(--purple);letter-spacing:3px;white-space:nowrap}
#current-preset-display{flex:1;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.preset-badge{padding:4px 14px;border-radius:20px;font-size:11px;font-weight:700;border:1px solid;letter-spacing:1px;transition:all .4s}
.preset-param{font-size:10px;padding:2px 8px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--subtext)}
.preset-param.active{color:var(--green);border-color:rgba(105,240,174,.3)}
#auto-preset-toggle{padding:6px 14px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px;border:1px solid var(--purple);background:rgba(206,147,216,.1);color:var(--purple);transition:all .2s;white-space:nowrap}
#auto-preset-toggle.on{background:rgba(206,147,216,.3);box-shadow:0 0 10px rgba(206,147,216,.3)}
#preset-palette{padding:10px 24px;background:#0d0d14;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.palette-label{font-size:9px;color:var(--subtext);letter-spacing:2px;width:100%;margin-bottom:2px}
.preset-chip{padding:5px 12px;border-radius:20px;cursor:pointer;font-size:11px;border:1px solid;transition:all .2s;user-select:none}
.preset-chip:hover{transform:translateY(-1px);filter:brightness(1.3)}
.preset-chip.selected{filter:brightness(1.4);box-shadow:0 0 10px}
.console{display:grid;grid-template-columns:1fr 1fr 1fr 220px;gap:2px;padding:2px;background:#050508}
@media(max-width:900px){.console{grid-template-columns:1fr 1fr}}
@media(max-width:560px){.console{grid-template-columns:1fr}}
.channel{background:var(--panel);border:1px solid var(--border);border-radius:8px;display:flex;flex-direction:column;overflow:hidden}
.ch-header{padding:12px 14px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px}
.ch-num{width:24px;height:24px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700}
.ch-name-input{flex:1;background:none;border:none;color:var(--text);font-family:inherit;font-size:13px;font-weight:700;outline:none;letter-spacing:1px}
.led{width:10px;height:10px;border-radius:50%;background:var(--led-off);border:1px solid #333;transition:all .15s}
.led.on-green{background:var(--green);box-shadow:0 0 6px var(--green)}
.led.on-orange{background:var(--orange);box-shadow:0 0 6px var(--orange)}
.led.on-red{background:var(--red);box-shadow:0 0 8px var(--red)}
.upload-zone{margin:12px;border-radius:8px;border:2px dashed var(--border);padding:16px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative}
.upload-zone:hover{border-color:var(--gold);background:rgba(245,200,66,.04)}
.upload-zone.loaded{border-style:solid;background:rgba(105,240,174,.05)}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-icon{font-size:22px;margin-bottom:6px}
.upload-label{font-size:11px;color:var(--subtext)}
.upload-filename{font-size:11px;color:var(--green);margin-top:4px;word-break:break-all}
.url-row{margin:0 12px 10px;display:flex;gap:6px}
.url-input{flex:1;padding:6px 10px;border-radius:6px;background:var(--panel2);border:1px solid var(--border);color:var(--text);font-size:11px;font-family:inherit;outline:none}
.url-load-btn{padding:6px 10px;border-radius:6px;cursor:pointer;background:rgba(79,195,247,.15);border:1px solid rgba(79,195,247,.4);color:var(--blue);font-size:11px;font-family:inherit;white-space:nowrap}
.eq-display{margin:0 12px 8px;height:44px;border-radius:6px;background:#080810;border:1px solid var(--border);position:relative;overflow:hidden}
.eq-display canvas{width:100%;height:100%;display:block}
.eq-label{position:absolute;top:3px;left:6px;font-size:8px;color:var(--subtext);letter-spacing:1px}
.fx-row{margin:0 12px 8px;display:flex;gap:4px;flex-wrap:wrap}
.fx-tag{font-size:9px;padding:2px 7px;border-radius:10px;border:1px solid;letter-spacing:.5px}
.ch-controls{padding:10px 14px;flex:1}
.ctrl-row{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.ctrl-label{font-size:9px;color:var(--subtext);letter-spacing:1px;width:28px;text-transform:uppercase}
input[type=range]{-webkit-appearance:none;appearance:none;height:4px;border-radius:2px;cursor:pointer;flex:1;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;cursor:pointer}
.range-vol::-webkit-slider-thumb{background:var(--green);box-shadow:0 0 4px var(--green)}
.range-pan::-webkit-slider-thumb{background:var(--blue);box-shadow:0 0 4px var(--blue)}
.range-fade::-webkit-slider-thumb{background:var(--gold);box-shadow:0 0 4px var(--gold)}
.ctrl-val{font-size:10px;color:var(--gold);width:34px;text-align:right;font-family:monospace}
.vu-meter{margin:0 14px 10px;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.vu-fill{height:100%;width:0%;border-radius:4px;background:linear-gradient(to right,var(--green),var(--orange),var(--red));transition:width .08s}
.fader-wrap{display:flex;flex-direction:column;align-items:center;padding:10px 14px;gap:6px}
.fader-label{font-size:9px;color:var(--subtext);letter-spacing:2px}
input[type=range].fader{writing-mode:vertical-lr;direction:rtl;width:4px;height:80px;background:var(--border);-webkit-appearance:slider-vertical}
input[type=range].fader::-webkit-slider-thumb{width:22px;height:10px;border-radius:3px;background:linear-gradient(135deg,#ccc,#888);box-shadow:0 2px 6px rgba(0,0,0,.6)}
.fader-db{font-size:10px;color:var(--gold)}
.transport{display:flex;gap:6px;padding:10px 14px;border-top:1px solid var(--border);flex-wrap:wrap}
.t-btn{flex:1;padding:8px 6px;border-radius:6px;cursor:pointer;font-size:16px;border:1px solid var(--border);background:var(--panel2);transition:all .15s;min-width:36px}
.t-btn:hover{transform:scale(1.05)}
.t-btn.play{background:rgba(105,240,174,.15);border-color:var(--green)}
.t-btn.pause{background:rgba(255,183,77,.15);border-color:var(--orange)}
.t-btn.stop{background:rgba(255,82,82,.15);border-color:var(--red)}
.t-btn.loop{background:rgba(79,195,247,.15);border-color:var(--blue)}
.t-btn.loop.on{background:rgba(79,195,247,.35);box-shadow:0 0 8px var(--blue)}
.time-display{background:#000;border:1px solid #333;border-radius:4px;padding:4px 8px;font-size:11px;color:var(--green);letter-spacing:2px;text-align:center;margin:0 14px 8px}
.right-col{display:flex;flex-direction:column;gap:2px}
.sfx-board{background:var(--panel);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.sfx-header{padding:12px 14px;border-bottom:1px solid var(--border);font-size:11px;color:var(--gold);letter-spacing:2px;display:flex;justify-content:space-between;align-items:center}
.sfx-grid{padding:10px;display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sfx-pad{border-radius:8px;padding:10px 8px;cursor:pointer;border:1px solid;text-align:center;transition:all .1s;user-select:none;position:relative;overflow:hidden}
.sfx-pad:active,.sfx-pad.firing{transform:scale(.95);filter:brightness(1.4)}
.sfx-pad-name{font-size:11px;font-weight:700;margin-bottom:4px}
.sfx-pad-key{font-size:9px;opacity:.5}
.sfx-pad-upload{position:absolute;inset:0;opacity:0;cursor:pointer}
.sfx-add-btn{width:100%;padding:8px;border-radius:6px;cursor:pointer;background:none;border:1px dashed var(--border);color:var(--subtext);font-family:inherit;font-size:12px}
.master-strip{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:14px;flex:1;display:flex;flex-direction:column;min-height:0}
.master-title{font-size:10px;color:var(--gold);letter-spacing:3px;margin-bottom:10px}
.scene-select{width:100%;background:var(--panel2);border:1px solid var(--border);color:var(--text);padding:7px 10px;border-radius:6px;font-family:inherit;font-size:12px;margin-bottom:8px;outline:none}
.scene-cue-list{flex:1;overflow-y:auto;max-height:320px}
.cue-item{padding:7px 8px;border-radius:6px;margin-bottom:5px;background:var(--panel2);border:1px solid var(--border);cursor:pointer;transition:background .15s}
.cue-item:hover{background:rgba(245,200,66,.08);border-color:var(--gold)}
.cue-item.active{background:rgba(105,240,174,.08);border-color:var(--green)}
.cue-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.save-row{display:flex;gap:6px;margin-top:10px}
.save-btn{flex:1;padding:7px;border-radius:6px;cursor:pointer;font-family:inherit;font-size:11px;border:1px solid}
.save-btn.save{background:rgba(245,200,66,.1);border-color:var(--gold);color:var(--gold)}
.save-btn.load{background:rgba(79,195,247,.1);border-color:var(--blue);color:var(--blue)}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:var(--panel)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
@keyframes presetFlash{0%{box-shadow:0 0 0}50%{box-shadow:0 0 20px var(--purple)}100%{box-shadow:0 0 0}}
.preset-flash{animation:presetFlash .6s ease}
#toast{position:fixed;bottom:20px;right:20px;background:rgba(105,240,174,.9);color:#000;padding:10px 18px;border-radius:8px;font-size:13px;display:none;z-index:999}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

@keyframes signalSlide{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>

<header>
  <div class="logo-area">
    <span style="font-size:24px">&#127962;</span>
    <div>
      <div class="logo-text">EAIM AUDIO MIXER</div>
      <div class="logo-sub">&#48688;&#51648;&#52744; &#44277;&#50672; &#50724;&#46356;&#50724; &#53076;&#49194;</div>
    </div>
  </div>
  <div class="master-vol-area">
    <div class="master-label">MASTER</div>
    <div class="vu-master" id="vu-master"></div>
    <input type="range" id="master-vol" min="0" max="100" value="85" style="width:80px" class="range-vol" oninput="setMasterVol(this.value)">
    <span style="font-size:11px;color:var(--gold);width:30px" id="master-vol-val">85</span>
  </div>
</header>

<div id="ai-preset-banner">
  <div class="ai-banner-label">&#10022; AI &#51020;&#54693;</div>
  <div id="current-preset-display">
    <div class="preset-badge" id="preset-badge-main" style="color:#888;border-color:#333">&#45824;&#44592; &#51473;</div>
    <div id="preset-params-display" style="display:flex;gap:8px;flex-wrap:wrap"></div>
  </div>
  <button id="auto-preset-toggle" class="on" onclick="toggleAutoPreset()">&#129302; &#51088;&#46041; &#51201;&#50857; ON</button>
</div>

<div id="preset-palette">
  <div class="palette-label">&#127917; &#48516;&#50948;&#44592; &#54532;&#47532;&#49352; &#8212; &#53364;&#47548;&#54616;&#50668; &#51989;&#49884; &#51201;&#50857;</div>
</div>

<div class="console">

  <div class="channel" id="ch-bgm">
    <div class="ch-header">
      <div class="ch-num" style="background:rgba(105,240,174,.2);color:var(--green)">1</div>
      <input class="ch-name-input" value="BGM &#48176;&#44221;&#51020;&#50545;" id="name-bgm">
      <div class="led" id="led-bgm"></div>
    </div>
    <div class="upload-zone" id="zone-bgm"><input type="file" id="file-bgm" accept="audio/*" onchange="loadFile('bgm',this)"><div class="upload-icon">&#127925;</div><div class="upload-label">MP3 / WAV &#50629;&#47196;&#46300;</div><div class="upload-filename" id="fname-bgm"></div></div>
    <div class="url-row"><input class="url-input" id="url-bgm" placeholder="&#46608;&#45716; URL &#51077;&#47141;..."><button class="url-load-btn" onclick="loadUrl('bgm')">&#47196;&#46300;</button></div>
    <div class="time-display" id="time-bgm">00:00 / 00:00</div>
    <div class="eq-display"><canvas id="eq-canvas-bgm"></canvas><div class="eq-label">EQ</div></div>
    <div class="fx-row" id="fx-bgm"></div>
    <div class="ch-controls">
      <div class="ctrl-row"><span class="ctrl-label">VOL</span><input type="range" class="range-vol" id="vol-bgm" min="0" max="150" value="80" oninput="setVol('bgm',this.value)"><span class="ctrl-val" id="vval-bgm">80%</span></div>
      <div class="ctrl-row"><span class="ctrl-label">PAN</span><input type="range" class="range-pan" id="pan-bgm" min="-100" max="100" value="0" oninput="setPan('bgm',this.value)"><span class="ctrl-val" id="pval-bgm">C</span></div>
      <div class="ctrl-row"><span class="ctrl-label">FADE</span><input type="range" class="range-fade" id="fade-bgm" min="0.5" max="8" value="2" step="0.5" oninput="document.getElementById('fval-bgm').textContent=this.value+'s'"><span class="ctrl-val" id="fval-bgm">2s</span></div>
    </div>
    <div class="vu-meter"><div class="vu-fill" id="vu-bgm"></div></div>
    <div class="fader-wrap"><span class="fader-label">FADER</span><input type="range" class="fader" id="fader-bgm" min="0" max="100" value="80" oninput="setFader('bgm',this.value)"><span class="fader-db" id="fdb-bgm">-3dB</span></div>
    <div class="transport">
      <button class="t-btn play" onclick="playTrack('bgm')">&#9654;</button>
      <button class="t-btn pause" onclick="pauseTrack('bgm')">&#9208;</button>
      <button class="t-btn stop" onclick="stopTrack('bgm')">&#9209;</button>
      <button class="t-btn loop" id="loop-bgm" onclick="toggleLoop('bgm')">&#128257;</button>
      <button class="t-btn" onclick="fadeOut('bgm')" style="font-size:11px;color:var(--gold)">FADE&#8595;</button>
      <button class="t-btn" onclick="fadeIn('bgm')" style="font-size:11px;color:var(--green)">FADE&#8593;</button>
    </div>
  </div>

  <div class="channel" id="ch-mr">
    <div class="ch-header">
      <div class="ch-num" style="background:rgba(206,147,216,.2);color:var(--purple)">2</div>
      <input class="ch-name-input" value="&#45357;&#48320; MR" id="name-mr">
      <div class="led" id="led-mr"></div>
    </div>
    <div class="upload-zone" id="zone-mr"><input type="file" id="file-mr" accept="audio/*" onchange="loadFile('mr',this)"><div class="upload-icon">&#127932;</div><div class="upload-label">MR / &#48152;&#51452; &#50629;&#47196;&#46300;</div><div class="upload-filename" id="fname-mr"></div></div>
    <div class="url-row"><input class="url-input" id="url-mr" placeholder="&#46608;&#45716; URL &#51077;&#47141;..."><button class="url-load-btn" onclick="loadUrl('mr')">&#47196;&#46300;</button></div>
    <div class="time-display" id="time-mr">00:00 / 00:00</div>
    <div class="eq-display"><canvas id="eq-canvas-mr"></canvas><div class="eq-label">EQ</div></div>
    <div class="fx-row" id="fx-mr"></div>
    <div class="ch-controls">
      <div class="ctrl-row"><span class="ctrl-label">VOL</span><input type="range" class="range-vol" id="vol-mr" min="0" max="150" value="100" oninput="setVol('mr',this.value)"><span class="ctrl-val" id="vval-mr">100%</span></div>
      <div class="ctrl-row"><span class="ctrl-label">PAN</span><input type="range" class="range-pan" id="pan-mr" min="-100" max="100" value="0" oninput="setPan('mr',this.value)"><span class="ctrl-val" id="pval-mr">C</span></div>
      <div class="ctrl-row"><span class="ctrl-label">FADE</span><input type="range" class="range-fade" id="fade-mr" min="0.5" max="8" value="1.5" step="0.5" oninput="document.getElementById('fval-mr').textContent=this.value+'s'"><span class="ctrl-val" id="fval-mr">1.5s</span></div>
    </div>
    <div class="vu-meter"><div class="vu-fill" id="vu-mr"></div></div>
    <div class="fader-wrap"><span class="fader-label">FADER</span><input type="range" class="fader" id="fader-mr" min="0" max="100" value="100" oninput="setFader('mr',this.value)"><span class="fader-db" id="fdb-mr">0dB</span></div>
    <div class="transport">
      <button class="t-btn play" onclick="playTrack('mr')">&#9654;</button>
      <button class="t-btn pause" onclick="pauseTrack('mr')">&#9208;</button>
      <button class="t-btn stop" onclick="stopTrack('mr')">&#9209;</button>
      <button class="t-btn loop" id="loop-mr" onclick="toggleLoop('mr')">&#128257;</button>
      <button class="t-btn" onclick="fadeOut('mr')" style="font-size:11px;color:var(--gold)">FADE&#8595;</button>
      <button class="t-btn" onclick="fadeIn('mr')" style="font-size:11px;color:var(--green)">FADE&#8593;</button>
    </div>
  </div>

  <div class="channel" id="ch-sfx2">
    <div class="ch-header">
      <div class="ch-num" style="background:rgba(255,183,77,.2);color:var(--orange)">3</div>
      <input class="ch-name-input" value="&#50571;&#48708;&#50616;&#49828;/&#45208;&#47808;&#51060;&#49496;" id="name-sfx2">
      <div class="led" id="led-sfx2"></div>
    </div>
    <div class="upload-zone" id="zone-sfx2"><input type="file" id="file-sfx2" accept="audio/*" onchange="loadFile('sfx2',this)"><div class="upload-icon">&#127754;</div><div class="upload-label">&#50571;&#48708;&#50616;&#49828; / &#45208;&#47808;&#51060;&#49496; &#50629;&#47196;&#46300;</div><div class="upload-filename" id="fname-sfx2"></div></div>
    <div class="url-row"><input class="url-input" id="url-sfx2" placeholder="&#46608;&#45716; URL &#51077;&#47141;..."><button class="url-load-btn" onclick="loadUrl('sfx2')">&#47196;&#46300;</button></div>
    <div class="time-display" id="time-sfx2">00:00 / 00:00</div>
    <div class="eq-display"><canvas id="eq-canvas-sfx2"></canvas><div class="eq-label">EQ</div></div>
    <div class="fx-row" id="fx-sfx2"></div>
    <div class="ch-controls">
      <div class="ctrl-row"><span class="ctrl-label">VOL</span><input type="range" class="range-vol" id="vol-sfx2" min="0" max="150" value="70" oninput="setVol('sfx2',this.value)"><span class="ctrl-val" id="vval-sfx2">70%</span></div>
      <div class="ctrl-row"><span class="ctrl-label">PAN</span><input type="range" class="range-pan" id="pan-sfx2" min="-100" max="100" value="0" oninput="setPan('sfx2',this.value)"><span class="ctrl-val" id="pval-sfx2">C</span></div>
      <div class="ctrl-row"><span class="ctrl-label">FADE</span><input type="range" class="range-fade" id="fade-sfx2" min="0.5" max="8" value="1" step="0.5" oninput="document.getElementById('fval-sfx2').textContent=this.value+'s'"><span class="ctrl-val" id="fval-sfx2">1s</span></div>
    </div>
    <div class="vu-meter"><div class="vu-fill" id="vu-sfx2"></div></div>
    <div class="fader-wrap"><span class="fader-label">FADER</span><input type="range" class="fader" id="fader-sfx2" min="0" max="100" value="70" oninput="setFader('sfx2',this.value)"><span class="fader-db" id="fdb-sfx2">-3dB</span></div>
    <div class="transport">
      <button class="t-btn play" onclick="playTrack('sfx2')">&#9654;</button>
      <button class="t-btn pause" onclick="pauseTrack('sfx2')">&#9208;</button>
      <button class="t-btn stop" onclick="stopTrack('sfx2')">&#9209;</button>
      <button class="t-btn loop" id="loop-sfx2" onclick="toggleLoop('sfx2')">&#128257;</button>
      <button class="t-btn" onclick="fadeOut('sfx2')" style="font-size:11px;color:var(--gold)">FADE&#8595;</button>
      <button class="t-btn" onclick="fadeIn('sfx2')" style="font-size:11px;color:var(--green)">FADE&#8593;</button>
    </div>
  </div>

  <div class="right-col">
    <div class="sfx-board">
      <div class="sfx-header"><span>&#9889; &#54952;&#44284;&#51020; &#54364;&#46300;</span><span style="font-size:9px;color:var(--subtext)">1~8&#53412;</span></div>

</div>
<div id="toast"></div>

<script>
'use strict';
const PRESETS=[
  {id:'bright',name:'밝고 신남',emoji:'☀️',color:'#f5c842',keywords:['밝','신나','즐거','파티','축제','학교','교실','놀이','설렘'],eq:{low:2,mid:1,high:4},reverb:0.1,delay:{time:0,feedback:0},desc:['고음↑','리버브 없음']},
  {id:'sad',name:'슬프고 감동',emoji:'🌧',color:'#90caf9',keywords:['슬','눈물','이별','그리움','감동','외로','아픔','위로'],eq:{low:3,mid:-1,high:-2},reverb:0.55,delay:{time:0.4,feedback:0.3},desc:['저음↑','리버브 강','에코']},
  {id:'tense',name:'긴장·위기',emoji:'⚡',color:'#ff5252',keywords:['긴장','위기','위험','공포','싸움','갈등','추격','탈출'],eq:{low:5,mid:2,high:-1},reverb:0.2,delay:{time:0.1,feedback:0.6},desc:['저음↑↑','딜레이 빠름']},
  {id:'romantic',name:'로맨틱·설렘',emoji:'💕',color:'#f48fb1',keywords:['사랑','설렘','로맨틱','두근','고백','연인','봄','꽃','따뜻'],eq:{low:1,mid:2,high:2},reverb:0.4,delay:{time:0.3,feedback:0.2},desc:['중음↑','리버브 중']},
  {id:'mysterious',name:'신비·환상',emoji:'🌙',color:'#ce93d8',keywords:['신비','환상','마법','꿈','우주','별','밤','어둠','요정','판타지'],eq:{low:-1,mid:-2,high:3},reverb:0.75,delay:{time:0.5,feedback:0.45},desc:['고음↑','리버브 강','딜레이 깊음']},
  {id:'outdoor',name:'야외·자연',emoji:'🌿',color:'#69f0ae',keywords:['야외','자연','숲','바다','산','강','바람','여름','소풍'],eq:{low:0,mid:1,high:1},reverb:0.35,delay:{time:0.2,feedback:0.1},desc:['플랫','리버브 중']},
  {id:'hall',name:'공연장·극장',emoji:'🎭',color:'#ffb74d',keywords:['무대','공연','극장','홀','콘서트','연극','발표','합창'],eq:{low:1,mid:0,high:1},reverb:0.65,delay:{time:0.25,feedback:0.2},desc:['플랫','리버브 홀']},
  {id:'comedy',name:'코믹·유머',emoji:'😄',color:'#80deea',keywords:['코미디','웃음','개그','유머','장난','재미','황당','엉뚱'],eq:{low:-1,mid:3,high:3},reverb:0.05,delay:{time:0,feedback:0},desc:['중·고음↑','선명함']},
  {id:'curtain',name:'커튼콜·피날레',emoji:'🌟',color:'#fff176',keywords:['커튼콜','피날레','마지막','엔딩','결말','끝','클라이맥스'],eq:{low:3,mid:1,high:2},reverb:0.7,delay:{time:0.3,feedback:0.25},desc:['저·고음↑','리버브 웅장']},
];

const AC=new(window.AudioContext||window.webkitAudioContext)();
const masterGain=AC.createGain();masterGain.gain.value=0.85;
const masterAnalyser=AC.createAnalyser();masterAnalyser.fftSize=256;
masterGain.connect(masterAnalyser);masterGain.connect(AC.destination);
const CHANNELS=['bgm','mr','sfx2'];
const tracks={};

CHANNELS.forEach(id=>{
  const eqLow=AC.createBiquadFilter();eqLow.type='lowshelf';eqLow.frequency.value=200;
  const eqMid=AC.createBiquadFilter();eqMid.type='peaking';eqMid.frequency.value=1000;eqMid.Q.value=1;
  const eqHigh=AC.createBiquadFilter();eqHigh.type='highshelf';eqHigh.frequency.value=4000;
  const delayNode=AC.createDelay(2);const delayFeedback=AC.createGain();delayFeedback.gain.value=0;
  const delayWet=AC.createGain();delayWet.gain.value=0;const delayDry=AC.createGain();delayDry.gain.value=1;
  const conv=AC.createConvolver();buildIR(conv,2.5);
  const revWet=AC.createGain();revWet.gain.value=0;const revDry=AC.createGain();revDry.gain.value=1;
  const gainNode=AC.createGain();const panNode=AC.createStereoPanner?AC.createStereoPanner():null;
  const analyser=AC.createAnalyser();analyser.fftSize=256;
  eqLow.connect(eqMid);eqMid.connect(eqHigh);
  eqHigh.connect(delayDry);eqHigh.connect(delayNode);
  delayNode.connect(delayFeedback);delayFeedback.connect(delayNode);delayNode.connect(delayWet);
  delayDry.connect(revDry);delayWet.connect(revDry);
  delayDry.connect(conv);delayWet.connect(conv);conv.connect(revWet);
  revDry.connect(gainNode);revWet.connect(gainNode);
  if(panNode){gainNode.connect(panNode);panNode.connect(masterGain);panNode.connect(analyser);}
  else{gainNode.connect(masterGain);gainNode.connect(analyser);}
  tracks[id]={audio:null,source:null,gainNode,panNode,analyser,eqLow,eqMid,eqHigh,delayNode,delayFeedback,delayWet,delayDry,convolver:conv,reverbWet:revWet,reverbDry:revDry,loop:false,vol:id==='mr'?1:id==='bgm'?0.8:0.7,currentPreset:null};
  gainNode.gain.value=tracks[id].vol;
});

function buildIR(conv,dur=2.5,decay=2){
  const sr=AC.sampleRate,len=Math.floor(sr*dur),buf=AC.createBuffer(2,len,sr);
  for(let ch=0;ch<2;ch++){const d=buf.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}
  conv.buffer=buf;
}

let autoPresetOn=true;

function applyPreset(p,anim=true){
  if(!p)return;
  CHANNELS.forEach(id=>{
    const t=tracks[id],now=AC.currentTime,r=anim?0.6:0.01;
    t.eqLow.gain.linearRampToValueAtTime(p.eq.low,now+r);
    t.eqMid.gain.linearRampToValueAtTime(p.eq.mid,now+r);
    t.eqHigh.gain.linearRampToValueAtTime(p.eq.high,now+r);
    t.reverbWet.gain.linearRampToValueAtTime(p.reverb,now+r);
    t.reverbDry.gain.linearRampToValueAtTime(1-p.reverb*0.5,now+r);
    t.delayNode.delayTime.linearRampToValueAtTime(p.delay.time,now+r);
    t.delayFeedback.gain.linearRampToValueAtTime(p.delay.feedback,now+r);
    t.delayWet.gain.linearRampToValueAtTime(p.delay.time>0?0.35:0,now+r);
    t.currentPreset=p.id;
  });
  const badge=document.getElementById('preset-badge-main');
  badge.textContent=p.emoji+' '+p.name;badge.style.color=p.color;badge.style.borderColor=p.color+'60';badge.style.background=p.color+'18';
  document.getElementById('preset-params-display').innerHTML=p.desc.map(d=>'<span class="preset-param active">'+d+'</span>').join('');
  document.querySelectorAll('.preset-chip').forEach(c=>c.classList.toggle('selected',c.dataset.pid===p.id));
  CHANNELS.forEach(id=>{
    const row=document.getElementById('fx-'+id);if(!row)return;
    const tags=[];
    if(p.eq.high>2)tags.push({l:'EQ↑고음',c:'#f5c842'});
    if(p.eq.low>2)tags.push({l:'EQ↑저음',c:'#ffb74d'});
    if(p.reverb>0.4)tags.push({l:'REVERB '+Math.round(p.reverb*100)+'%',c:'#ce93d8'});
    if(p.delay.time>0)tags.push({l:'DELAY '+p.delay.time+'s',c:'#4fc3f7'});
    row.innerHTML=tags.map(t=>'<span class="fx-tag" style="color:'+t.c+';border-color:'+t.c+'44;background:'+t.c+'11">'+t.l+'</span>').join('');
  });
  drawAllEQ(p);
  if(anim){const b=document.getElementById('ai-preset-banner');b.classList.remove('preset-flash');void b.offsetWidth;b.classList.add('preset-flash');toast('✦ AI 음향: '+p.emoji+' '+p.name);}
}

function detectPreset(text){
  if(!text)return null;
  const lo=text.toLowerCase();let best=null,bs=0;
  PRESETS.forEach(p=>{const s=p.keywords.filter(k=>lo.includes(k)).length;if(s>bs){bs=s;best=p;}});
  return bs>0?best:null;
}

function toggleAutoPreset(){
  autoPresetOn=!autoPresetOn;
  const btn=document.getElementById('auto-preset-toggle');
  btn.textContent=autoPresetOn?'🤖 자동 적용 ON':'🤖 자동 적용 OFF';
  btn.classList.toggle('on',autoPresetOn);
  toast(autoPresetOn?'✦ AI 자동 음향 켜짐':'AI 자동 음향 꺼짐');
}

function buildPresetPalette(){
  const pal=document.getElementById('preset-palette');
  PRESETS.forEach(p=>{
    const c=document.createElement('div');c.className='preset-chip';c.dataset.pid=p.id;
    c.style.color=p.color;c.style.borderColor=p.color+'55';c.style.background=p.color+'15';
    c.textContent=p.emoji+' '+p.name;c.onclick=()=>applyPreset(p,true);pal.appendChild(c);
  });
}

function drawEQCurve(id,p){
  const cv=document.getElementById('eq-canvas-'+id);if(!cv)return;
  const ctx=cv.getContext('2d');const W=cv.offsetWidth||160,H=cv.offsetHeight||44;
  cv.width=W;cv.height=H;ctx.clearRect(0,0,W,H);
  ctx.strokeStyle='#2a2a3a';ctx.lineWidth=1;ctx.setLineDash([3,3]);
  ctx.beginPath();ctx.moveTo(0,H/2);ctx.lineTo(W,H/2);ctx.stroke();ctx.setLineDash([]);
  if(!p)return;
  const pts=[{x:W*.15,y:H/2-p.eq.low*2.5},{x:W*.5,y:H/2-p.eq.mid*2.5},{x:W*.85,y:H/2-p.eq.high*2.5}];
  ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.shadowColor=p.color;ctx.shadowBlur=4;
  ctx.beginPath();ctx.moveTo(0,H/2);
  ctx.bezierCurveTo(pts[0].x-10,H/2,pts[0].x,pts[0].y,pts[0].x,pts[0].y);
  ctx.bezierCurveTo(pts[0].x+(pts[1].x-pts[0].x)*.5,pts[0].y,pts[1].x-(pts[1].x-pts[0].x)*.5,pts[1].y,pts[1].x,pts[1].y);
  ctx.bezierCurveTo(pts[1].x+(pts[2].x-pts[1].x)*.5,pts[1].y,pts[2].x-(pts[2].x-pts[1].x)*.5,pts[2].y,pts[2].x,pts[2].y);
  ctx.bezierCurveTo(pts[2].x+10,pts[2].y,W,H/2,W,H/2);
  ctx.stroke();ctx.shadowBlur=0;
}
function drawAllEQ(p){CHANNELS.forEach(id=>drawEQCurve(id,p));}

function loadFile(id,input){
  if(!input.files[0])return;
  const file=input.files[0];setAudioSrc(id,URL.createObjectURL(file));
  document.getElementById('fname-'+id).textContent=file.name;
  document.getElementById('zone-'+id).classList.add('loaded');
  toast('✅ '+file.name+' 로드됨');
}
function loadUrl(id){const url=document.getElementById('url-'+id).value.trim();if(!url)return;setAudioSrc(id,url);toast('🔗 URL 로드 시도...');}
function setAudioSrc(id,url){
  const t=tracks[id];
  if(t.audio){t.audio.pause();t.source&&t.source.disconnect();}
  const audio=new Audio();audio.crossOrigin='anonymous';audio.src=url;audio.loop=t.loop;audio.preload='metadata';
  const src=AC.createMediaElementSource(audio);src.connect(t.eqLow);
  t.audio=audio;t.source=src;
  audio.addEventListener('timeupdate',()=>updateTime(id));
  audio.addEventListener('loadedmetadata',()=>updateTime(id));
  audio.addEventListener('playing',()=>updateLed(id,'on-green'));
  audio.addEventListener('pause',()=>updateLed(id,''));
  audio.addEventListener('ended',()=>updateLed(id,''));
}

function resumeAC(){if(AC.state==='suspended')AC.resume();}
function playTrack(id){resumeAC();const t=tracks[id];if(!t.audio){toast('⚠ 오디오를 업로드하세요');return;}t.audio.play().catch(e=>toast('재생 오류: '+e.message));}
function pauseTrack(id){const t=tracks[id];if(t.audio)t.audio.pause();}
function stopTrack(id){const t=tracks[id];if(!t.audio)return;t.audio.pause();t.audio.currentTime=0;updateLed(id,'');}
function toggleLoop(id){
  const t=tracks[id];t.loop=!t.loop;if(t.audio)t.audio.loop=t.loop;
  document.getElementById('loop-'+id).classList.toggle('on',t.loop);
  toast(id.toUpperCase()+' 반복 '+(t.loop?'ON':'OFF'));
}
function fadeOut(id){
  resumeAC();const t=tracks[id];const sec=parseFloat(document.getElementById('fade-'+id).value);
  const g=t.gainNode.gain;g.cancelScheduledValues(AC.currentTime);g.setValueAtTime(g.value,AC.currentTime);
  g.linearRampToValueAtTime(0,AC.currentTime+sec);
  setTimeout(()=>{if(t.audio)t.audio.pause();},sec*1000+100);
  toast('🔽 '+id.toUpperCase()+' FADE OUT '+sec+'s');
}
function fadeIn(id){
  resumeAC();const t=tracks[id];if(!t.audio){toast('⚠ 오디오를 업로드하세요');return;}
  const sec=parseFloat(document.getElementById('fade-'+id).value);
  const g=t.gainNode.gain;g.cancelScheduledValues(AC.currentTime);g.setValueAtTime(0,AC.currentTime);
  t.audio.play().catch(()=>{});g.linearRampToValueAtTime(t.vol,AC.currentTime+sec);
  toast('🔼 '+id.toUpperCase()+' FADE IN '+sec+'s');
}

function setVol(id,val){
  tracks[id].vol=val/100;tracks[id].gainNode.gain.value=val/100;
  document.getElementById('vval-'+id).textContent=val+'%';
  document.getElementById('fader-'+id).value=val;updateFaderDb(id,val);
}
function setFader(id,val){
  tracks[id].vol=val/100;tracks[id].gainNode.gain.value=val/100;
  document.getElementById('vol-'+id).value=val;document.getElementById('vval-'+id).textContent=val+'%';updateFaderDb(id,val);
}
function updateFaderDb(id,val){document.getElementById('fdb-'+id).textContent=val==0?'-∞':(20*Math.log10(val/100)).toFixed(1)+'dB';}
function setPan(id,val){
  const t=tracks[id];if(t.panNode)t.panNode.pan.value=val/100;
  document.getElementById('pval-'+id).textContent=val==0?'C':val>0?'R'+val:'L'+(-val);
}
function setMasterVol(val){masterGain.gain.value=val/100;document.getElementById('master-vol-val').textContent=val;}

const vuData=new Uint8Array(32);
function animateVU(){
  CHANNELS.forEach(id=>{
    const t=tracks[id];
    if(!t.audio||t.audio.paused){document.getElementById('vu-'+id).style.width='0%';return;}
    t.analyser.getByteFrequencyData(vuData);
    const pct=Math.min(100,(vuData.slice(0,16).reduce((a,b)=>a+b,0)/16/128)*100);
    document.getElementById('vu-'+id).style.width=pct+'%';
    updateLed(id,pct>80?'on-red':pct>40?'on-orange':'on-green');
  });
  masterAnalyser.getByteFrequencyData(vuData);
  const mp=Math.min(100,(vuData.slice(0,16).reduce((a,b)=>a+b,0)/16/128)*100);
  const bars=document.querySelectorAll('.vu-bar');
  bars.forEach((b,i)=>{b.style.height=(i<mp/(100/bars.length)?8+i*1.5:3)+'px';b.style.background=i>bars.length*.8?'var(--red)':i>bars.length*.6?'var(--orange)':'var(--green)';});
  requestAnimationFrame(animateVU);
}
function updateLed(id,cls){document.getElementById('led-'+id).className='led '+cls;}
function updateTime(id){
  const a=tracks[id].audio;if(!a)return;
  const fmt=s=>String(Math.floor(s/60)).padStart(2,'0')+':'+String(Math.floor(s%60)).padStart(2,'0');
  document.getElementById('time-'+id).textContent=fmt(a.currentTime)+' / '+fmt(isNaN(a.duration)?0:a.duration);
}

const SFX_DEFAULTS=[
  {name:'박수',emoji:'👏',color:'#4fc3f7',key:'1',url:'https://cdn.pixabay.com/audio/2022/03/15/audio_1a13b0ff8b.mp3'},
  {name:'천둥',emoji:'⛈',color:'#ce93d8',key:'2',url:'https://cdn.pixabay.com/audio/2022/03/10/audio_270f861e91.mp3'},
  {name:'바람',emoji:'🌬',color:'#80cbc4',key:'3',url:'https://cdn.pixabay.com/audio/2022/01/18/audio_d1718ab374.mp3'},
  {name:'종소리',emoji:'🔔',color:'#f5c842',key:'4',url:'https://cdn.pixabay.com/audio/2021/08/04/audio_0625f624a7.mp3'},
  {name:'환호성',emoji:'📣',color:'#69f0ae',key:'5',url:'https://cdn.pixabay.com/audio/2022/03/15/audio_1a13b0ff8b.mp3'},
  {name:'문소리',emoji:'🚪',color:'#ff8a65',key:'6',url:'https://cdn.pixabay.com/audio/2021/08/09/audio_dc39bfc5f2.mp3'},
  {name:'비소리',emoji:'🌧',color:'#90caf9',key:'7',url:'https://cdn.pixabay.com/audio/2022/05/13/audio_98971e1af0.mp3'},
  {name:'조명ON',emoji:'💡',color:'#ffe082',key:'8',url:'https://cdn.pixabay.com/audio/2021/08/04/audio_0625f624a7.mp3'},
];
const sfxPads=SFX_DEFAULTS.map((d,i)=>({...d,audio:null,id:'pad'+i}));
function loadDefaultSfx(){
  sfxPads.forEach((p,i)=>{try{const a=new Audio();a.crossOrigin='anonymous';a.src=p.url;a.preload='auto';sfxPads[i].audio=a;}catch(e){}});
  buildSfxPads();
}
function buildSfxPads(){
  const g=document.getElementById('sfx-grid');g.innerHTML='';
  sfxPads.forEach((p,i)=>{
    const d=document.createElement('div');d.className='sfx-pad';d.id=p.id;
    d.style.cssText='background:'+p.color+'18;border-color:'+p.color+'60;color:'+p.color;
    d.innerHTML='<input type="file" class="sfx-pad-upload" accept="audio/*" onchange="loadSfxFile('+i+',this)"><div style="font-size:20px;margin-bottom:4px">'+p.emoji+'</div><div class="sfx-pad-name">'+p.name+'</div><div class="sfx-pad-key">[ '+p.key+' ]</div><div style="font-size:8px;margin-top:3px;color:'+(p.audio?'var(--green)':'rgba(255,255,255,.2)')+'">'+( p.audio?'● 로드됨':'○ 없음')+'</div>';
    d.addEventListener('click',e=>{if(!e.target.classList.contains('sfx-pad-upload'))fireSfx(i);});
    g.appendChild(d);
  });
  const a=document.createElement('div');a.style.gridColumn='1/-1';
  a.innerHTML='<button class="sfx-add-btn" onclick="addSfxPad()">+ 효과음 추가</button>';g.appendChild(a);
}
function loadSfxFile(i,inp){if(!inp.files[0])return;sfxPads[i].audio=new Audio(URL.createObjectURL(inp.files[0]));sfxPads[i].name=inp.files[0].name.replace(/\.[^.]+$/,'').slice(0,8);buildSfxPads();}
function fireSfx(i){resumeAC();const p=sfxPads[i];if(!p.audio){toast('⚠ 파일을 업로드하세요');return;}p.audio.currentTime=0;p.audio.play();const el=document.getElementById(p.id);el.classList.add('firing');setTimeout(()=>el.classList.remove('firing'),150);}
function addSfxPad(){const em=['🎺','🥁','🎻','🎹','🪗','🎷','🪘','🔊'],co=['#f48fb1','#a5d6a7','#fff176','#b39ddb','#80deea','#ffcc80'];sfxPads.push({name:'패드'+(sfxPads.length+1),emoji:em[sfxPads.length%8],color:co[sfxPads.length%co.length],key:'',audio:null,id:'pad'+sfxPads.length});buildSfxPads();}
document.addEventListener('keydown',e=>{
  if(['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName))return;
  const i=parseInt(e.key)-1;if(i>=0&&i<sfxPads.length)fireSfx(i);
  if(e.key===' '){e.preventDefault();const t=tracks['bgm'];if(t.audio&&!t.audio.paused)pauseTrack('bgm');else playTrack('bgm');}
});

let cues=[],activeCue=-1;

function saveCue(){
  const name=prompt('큐 이름:','CUE '+(cues.length+1));if(!name)return;
  const ap=PRESETS.find(p=>tracks['bgm'].currentPreset===p.id)||null;
  cues.push({
    name,presetId:ap?ap.id:null,
    bgm:{vol:tracks.bgm.vol,pan:document.getElementById('pan-bgm').value,loop:tracks.bgm.loop,
         url:tracks.bgm.audio?tracks.bgm.audio.src:null,fname:document.getElementById('fname-bgm').textContent||''},
    mr:{vol:tracks.mr.vol,pan:document.getElementById('pan-mr').value,loop:tracks.mr.loop,
        url:tracks.mr.audio?tracks.mr.audio.src:null,fname:document.getElementById('fname-mr').textContent||''},
    sfx2:{vol:tracks.sfx2.vol,pan:document.getElementById('pan-sfx2').value,loop:tracks.sfx2.loop,
          url:tracks.sfx2.audio?tracks.sfx2.audio.src:null,fname:document.getElementById('fname-sfx2').textContent||''},
  });
  rebuildCueList();toast('💾 "'+name+'" 저장됨');
}

function rebuildCueList(){
  const list=document.getElementById('cue-list'),sel=document.getElementById('scene-select');
  list.innerHTML='';sel.innerHTML='<option value="">-- 큐 선택 --</option>';
  cues.forEach((c,i)=>{
    const p=c.presetId?PRESETS.find(x=>x.id===c.presetId):null;
    const hb=c.bgm&&c.bgm.fname,hm=c.mr&&c.mr.fname;
    const div=document.createElement('div');
    div.className='cue-item'+(i===activeCue?' active':'');
    div.innerHTML=
      '<div style="width:100%">'+
        '<div style="display:flex;align-items:center;gap:5px;margin-bottom:4px">'+
          '<div class="cue-dot" style="background:'+(p?p.color:'var(--gold)')+'"></div>'+
          '<span style="color:var(--subtext);font-size:10px;width:18px">'+String(i+1).padStart(2,'0')+'</span>'+
          '<span style="flex:1;font-size:11px;font-weight:700">'+c.name+'</span>'+
          (p?'<span style="font-size:10px;color:'+p.color+'">'+p.emoji+'</span>':'')+
          '<span style="font-size:9px;color:var(--subtext);cursor:pointer" onclick="event.stopPropagation();deleteCue('+i+')">✕</span>'+
        '</div>'+
        '<div style="display:flex;gap:4px;padding-left:16px;flex-wrap:wrap">'+
          '<span style="font-size:8px;padding:1px 5px;border-radius:6px;background:'+(hb?'rgba(105,240,174,.1)':'rgba(255,255,255,.03)')+';border:1px solid '+(hb?'rgba(105,240,174,.3)':'#222')+';color:'+(hb?'var(--green)':'#444')+'">'+
            '🎵 '+(hb?c.bgm.fname.slice(0,14)+(c.bgm.fname.length>14?'…':''):'없음')+
          '</span>'+
          '<span style="font-size:8px;padding:1px 5px;border-radius:6px;background:'+(hm?'rgba(206,147,216,.1)':'rgba(255,255,255,.03)')+';border:1px solid '+(hm?'rgba(206,147,216,.3)':'#222')+';color:'+(hm?'var(--purple)':'#444')+'">'+
            '🎼 '+(hm?c.mr.fname.slice(0,14)+(c.mr.fname.length>14?'…':''):'없음')+
          '</span>'+
        '</div>'+
      '</div>';
    div.onclick=()=>loadCue(i);list.appendChild(div);
    const opt=document.createElement('option');opt.value=i;opt.textContent=String(i+1).padStart(2,'0')+'. '+c.name;sel.appendChild(opt);
  });
}

function loadCue(idx){
  idx=parseInt(idx);if(isNaN(idx)||idx<0||idx>=cues.length)return;
  const c=cues[idx];activeCue=idx;
  setFader('bgm',Math.round(c.bgm.vol*100));setPan('bgm',parseInt(c.bgm.pan));
  setFader('mr',Math.round(c.mr.vol*100));setPan('mr',parseInt(c.mr.pan));
  setFader('sfx2',Math.round(c.sfx2.vol*100));setPan('sfx2',parseInt(c.sfx2.pan));

  // ✦ 방식A: 막마다 파일 자동 교체
  ['bgm','mr','sfx2'].forEach(id=>{
    const ch=c[id];if(!ch||!ch.url)return;
    const cur=tracks[id].audio;
    if(cur&&cur.src===ch.url)return;
    if(cur&&!cur.paused)cur.pause();
    setAudioSrc(id,ch.url);
    if(ch.loop!==undefined)tracks[id].audio.loop=!!ch.loop;
    if(ch.fname){document.getElementById('fname-'+id).textContent=ch.fname;document.getElementById('zone-'+id).classList.add('loaded');}
  });

  // 루프 동기화
  ['bgm','mr','sfx2'].forEach(id=>{const ch=c[id];if(!ch)return;if(tracks[id].loop!==!!ch.loop)toggleLoop(id);});

  // AI 프리셋 자동 적용
  if(c.presetId&&autoPresetOn){const p=PRESETS.find(x=>x.id===c.presetId);if(p)applyPreset(p,true);}

  rebuildCueList();
  const pp=c.presetId?PRESETS.find(x=>x.id===c.presetId):null;
  toast('▶ CUE '+String(idx+1).padStart(2,'0')+': "'+c.name+'" '+(pp?pp.emoji:'')+' 로드됨');
}

function deleteCue(i){cues.splice(i,1);if(activeCue>=cues.length)activeCue=-1;rebuildCueList();}
function loadCueFromStorage(){const r=localStorage.getItem('eaim_mixer_cues');if(!r){toast('저장된 큐가 없습니다');return;}try{cues=JSON.parse(r);rebuildCueList();toast('📂 '+cues.length+'개 큐 불러옴');}catch(e){toast('불러오기 실패');}}
function saveAllCues(){
  localStorage.setItem('eaim_mixer_cues',JSON.stringify(cues));
  const blob=new Blob([JSON.stringify(cues,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='eaim_mixer_cues.json';a.click();
  toast('📥 내보내기 완료');
}

function buildMasterVU(){const w=document.getElementById('vu-master');for(let i=0;i<14;i++){const b=document.createElement('div');b.className='vu-bar';b.style.height='4px';w.appendChild(b);}}

let toastTimer;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.style.display='block';el.style.animation='none';void el.offsetWidth;el.style.animation='fadeUp .3s ease';clearTimeout(toastTimer);toastTimer=setTimeout(()=>el.style.display='none',2500);}


// ══════════════════════════
// 🚦 신호등 시스템 (슬라이드쇼 연동)
// ══════════════════════════
let signalCheckInterval = null;
let lastSignalScene = -1;

function startSignalWatch() {
  if (signalCheckInterval) return;
  signalCheckInterval = setInterval(() => {
    const raw = localStorage.getItem('eaim_slide_signal');
    if (!raw) return;
    try {
      const sig = JSON.parse(raw);
      if (sig.sceneIdx === lastSignalScene) return; // 같은 신호면 무시
      lastSignalScene = sig.sceneIdx;
      showSlideSignal(sig);
    } catch(e) {}
  }, 500);
  toast('🚦 슬라이드쇼 신호등 연결됨');
}

function stopSignalWatch() {
  if (signalCheckInterval) { clearInterval(signalCheckInterval); signalCheckInterval = null; }
}

function showSlideSignal(sig) {
  // 해당 큐 찾기
  const matchIdx = cues.findIndex((c, i) => {
    // 큐 이름에서 막 번호 매칭 또는 순서 매칭
    if (sig.type === 'opening' && c.name.includes('오프닝')) return true;
    if (sig.type === 'curtain' && c.name.includes('커튼콜')) return true;
    // 장면 번호로 매칭 (sceneIdx+1 = 막 번호)
    const sceneNum = sig.sceneIdx + 1;
    return c.name.startsWith(sceneNum + '막') || c.name.includes('장면' + sceneNum);
  });

  const signalEl = document.getElementById('slide-signal');
  if (!signalEl) return;

  const preset = sig.presetId ? PRESETS.find(p => p.id === sig.presetId) : null;
  const cueName = matchIdx >= 0 ? cues[matchIdx].name : (sig.title || '장면 ' + (sig.sceneIdx + 1));

  signalEl.style.display = 'flex';
  signalEl.innerHTML =
    '<div style="display:flex;align-items:center;gap:10px;width:100%">' +
      '<div style="font-size:20px">🚦</div>' +
      '<div style="flex:1">' +
        '<div style="font-size:9px;color:var(--subtext);letter-spacing:2px;margin-bottom:2px">슬라이드쇼 신호</div>' +
        '<div style="font-size:12px;font-weight:700;color:#fff">' + sig.title + '</div>' +
        (preset ? '<div style="font-size:10px;color:' + preset.color + ';margin-top:1px">' + preset.emoji + ' ' + preset.name + '</div>' : '') +
      '</div>' +
      (matchIdx >= 0 ?
        '<button onclick="loadCue(' + matchIdx + ');hideSignal()" style="padding:6px 12px;border-radius:6px;cursor:pointer;background:rgba(105,240,174,.2);border:1px solid var(--green);color:var(--green);font-family:inherit;font-size:11px;font-weight:700;white-space:nowrap">' +
          '▶ CUE ' + String(matchIdx + 1).padStart(2,'0') + ' 실행' +
        '</button>' :
        '<div style="font-size:10px;color:var(--subtext)">매칭 큐 없음</div>'
      ) +
      '<button onclick="hideSignal()" style="margin-left:6px;padding:4px 8px;border-radius:4px;cursor:pointer;background:rgba(255,255,255,.05);border:1px solid #333;color:var(--subtext);font-family:inherit;font-size:11px">✕</button>' +
    '</div>';

  // 5초 후 자동 숨김
  clearTimeout(signalEl._timer);
  signalEl._timer = setTimeout(hideSignal, 8000);
}

function hideSignal() {
  const el = document.getElementById('slide-signal');
  if (el) el.style.display = 'none';
}


function toggleSignalWatch() {
  const btn = document.getElementById('signal-toggle-btn');
  if (signalCheckInterval) {
    stopSignalWatch();
    btn.textContent = '🚦 슬라이드 연동 OFF';
    btn.style.borderColor = '#333';
    btn.style.color = 'var(--subtext)';
    toast('슬라이드쇼 연동 꺼짐');
  } else {
    startSignalWatch();
    btn.textContent = '🚦 슬라이드 연동 ON';
    btn.style.borderColor = 'rgba(105,240,174,.5)';
    btn.style.color = 'var(--green)';
  }
}

function autoImportFromMaker(){
  const raw=localStorage.getItem('eaim_musical_data');if(!raw)return;
  try{
    const data=JSON.parse(raw);if(!data.scenes||cues.length>0)return;
    data.scenes.forEach((s,i)=>{
      const text=[s.title||'',s.emotion||'',s.musicMood||'',s.lyrics||'',s.characters||''].join(' ');
      const preset=s.type==='opening'?PRESETS.find(p=>p.id==='hall'):(detectPreset(text)||PRESETS.find(p=>p.id==='hall'));
      const name=s.type==='opening'?'오프닝: '+(s.songTitle||s.title||''):i+'막: '+(s.title||'')+' ('+(s.emotion||'')+')';
      cues.push({name,presetId:preset.id,
        bgm:{vol:0.8,pan:0,loop:true,url:null,fname:''},
        mr:{vol:0,pan:0,loop:false,url:null,fname:''},
        sfx2:{vol:0.5,pan:0,loop:false,url:null,fname:''},
      });
    });
    cues.push({name:'커튼콜: '+(data.curtainSongTitle||'피날레'),presetId:'curtain',
      bgm:{vol:0.6,pan:0,loop:true,url:null,fname:''},mr:{vol:1,pan:0,loop:false,url:null,fname:''},sfx2:{vol:0.3,pan:0,loop:false,url:null,fname:''}});
    rebuildCueList();
    const sum=cues.map(c=>{const p=PRESETS.find(x=>x.id===c.presetId);return p?p.emoji:'?';}).join(' → ');
    toast('🎭 "'+data.title+'" '+cues.length+'개 큐 생성! '+sum);
    if(cues[0]&&autoPresetOn){const fp=PRESETS.find(p=>p.id===cues[0].presetId);if(fp)setTimeout(()=>applyPreset(fp,false),500);}
  }catch(e){console.warn(e);}
}

buildMasterVU();buildPresetPalette();loadDefaultSfx();animateVU();drawAllEQ(null);autoImportFromMaker();
setTimeout(()=>{const h=PRESETS.find(p=>p.id==='hall');applyPreset(h,false);},300);
toast('🎚 EAIM 오디오 믹서 준비 완료 — 공연 파이팅! 🎭');
</script>
