<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎭 뮤지컬메이커 | EAIM</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@300;400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0a0810;--gold:#d4a843;--gold2:#f0c96a;
  --purple:#7c3aed;--pink:#c778dd;--blue:#5DADE2;
  --green:#52c27a;--red:#ef4444;
  --text:#f0e8ff;--sub:#9a8aaa;
  --border:rgba(212,168,67,0.15);--card:rgba(255,255,255,0.04);
}
body{font-family:'Noto Serif KR',serif;background:var(--bg);color:var(--text);min-height:100vh;
  background-image:radial-gradient(ellipse at 20% 0%,rgba(124,58,237,0.15) 0%,transparent 50%),
  radial-gradient(ellipse at 80% 100%,rgba(93,173,226,0.1) 0%,transparent 50%);}

/* ── 로그인 ── */
.login-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
.login-box{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:400px;}
.login-logo{font-family:'Cormorant Garamond',serif;font-size:2.4rem;font-weight:700;color:var(--gold);text-align:center;margin-bottom:4px;text-shadow:0 0 30px rgba(212,168,67,0.4);}
.login-sub{font-size:0.68rem;color:var(--sub);text-align:center;letter-spacing:0.25em;margin-bottom:28px;}
.login-tabs{display:flex;background:rgba(0,0,0,0.3);border-radius:10px;padding:4px;margin-bottom:22px;gap:4px;}
.login-tab{flex:1;padding:10px;border-radius:7px;font-size:0.85rem;font-weight:700;cursor:pointer;text-align:center;border:none;font-family:inherit;background:none;color:var(--sub);transition:all .2s;}
.login-tab.on{background:rgba(212,168,67,0.15);color:var(--gold);}
.field-label{font-size:0.7rem;color:var(--sub);margin-bottom:6px;letter-spacing:.1em;}
.t-input{background:rgba(0,0,0,0.3);border:1px solid rgba(255,255,255,0.1);color:var(--text);border-radius:10px;width:100%;padding:12px 14px;font-size:0.9rem;font-family:inherit;outline:none;transition:border-color .2s;margin-bottom:10px;}
.t-input:focus{border-color:var(--gold);}
.t-input::placeholder{color:rgba(255,255,255,0.2);}
.main-btn{background:linear-gradient(135deg,#d4a843,#e8a020);color:#000;border:none;border-radius:12px;font-weight:900;font-size:1rem;padding:15px;width:100%;cursor:pointer;transition:all .2s;font-family:inherit;margin-top:4px;}
.main-btn:hover{transform:translateY(-1px);box-shadow:0 6px 25px rgba(212,168,67,0.4);}
.main-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.err-msg{font-size:.72rem;color:#fca5a5;margin-bottom:8px;min-height:18px;}
.notice-box{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.25);border-radius:10px;padding:14px;text-align:center;margin-bottom:14px;}

/* ── 헤더 ── */
.app-header{background:linear-gradient(180deg,#3d0a14 0%,#5c1121 60%,transparent 100%);border-bottom:2px solid var(--gold);padding:14px 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(10px);}
.header-inner{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;}
.logo-t{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:var(--gold);}
.header-right{display:flex;align-items:center;gap:10px;}
.mode-badge{font-size:.6rem;padding:3px 10px;border-radius:10px;font-weight:700;letter-spacing:.1em;}
.badge-teacher{background:rgba(212,168,67,0.2);color:var(--gold);border:1px solid rgba(212,168,67,0.4);}
.badge-student{background:rgba(82,194,122,0.2);color:#86efac;border:1px solid rgba(82,194,122,0.4);}
.logout-btn{font-size:.62rem;color:rgba(255,255,255,.3);background:none;border:none;cursor:pointer;}

/* ── 탭바 ── */
.tab-bar{display:flex;background:rgba(0,0,0,0.4);border-bottom:1px solid rgba(255,255,255,.08);position:sticky;top:58px;z-index:90;}
.tab-btn{flex:1;padding:11px 4px;font-size:.78rem;font-weight:700;cursor:pointer;border:none;background:none;color:rgba(255,255,255,.35);font-family:inherit;transition:all .2s;border-bottom:2px solid transparent;}
.tab-btn.on{color:var(--gold);border-bottom-color:var(--gold);}
.badge-count{background:rgba(212,168,67,0.2);color:var(--gold);border-radius:8px;padding:1px 6px;font-size:.62rem;margin-left:4px;}

/* ── 메인 레이아웃 ── */
main{max-width:900px;margin:0 auto;padding:24px 16px 80px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px;margin-bottom:14px;}
.card-title{font-family:'Cormorant Garamond',serif;font-size:1.1rem;font-weight:700;color:var(--gold);margin-bottom:16px;display:flex;align-items:center;gap:8px;}

/* ── API 상태 ── */
.api-badge{display:flex;align-items:center;gap:8px;background:rgba(0,0,0,0.3);border:1px solid rgba(212,168,67,0.2);border-radius:10px;padding:10px 14px;}
.api-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-on{background:var(--green);box-shadow:0 0 6px var(--green);}
.dot-off{background:rgba(255,255,255,.2);}

/* ── 토글 ── */
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:rgba(0,0,0,0.25);border-radius:10px;border:1px solid rgba(255,255,255,.08);}
.toggle-track{width:50px;height:26px;border-radius:13px;background:rgba(255,255,255,.1);position:relative;cursor:pointer;transition:background .3s;flex-shrink:0;}
.toggle-track.on{background:rgba(82,194,122,0.5);border:1px solid var(--green);}
.toggle-thumb{width:20px;height:20px;border-radius:50%;background:rgba(255,255,255,.4);position:absolute;top:3px;left:3px;transition:all .3s;}
.toggle-track.on .toggle-thumb{left:27px;background:var(--green);box-shadow:0 0 6px var(--green);}

/* ── 장르 2단계 ── */
.genre-step{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:14px;margin-bottom:8px;}
.genre-step-lbl{font-size:.68rem;color:var(--sub);letter-spacing:.15em;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.step-badge{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:700;}
.sb1{background:rgba(212,168,67,0.25);color:var(--gold);}
.sb2{background:rgba(199,120,221,0.25);color:var(--pink);}
.genre-tags{display:flex;flex-wrap:wrap;gap:7px;}
.gtag{padding:7px 14px;border-radius:20px;cursor:pointer;font-size:.8rem;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);color:var(--sub);transition:all .2s;user-select:none;}
.gtag:hover{border-color:var(--gold);color:var(--gold);}
.gtag.on-bg{background:rgba(212,168,67,0.15);border-color:var(--gold);color:var(--gold);font-weight:700;}
.gtag.on-mood{background:rgba(199,120,221,0.15);border-color:var(--pink);color:var(--pink);font-weight:700;}
.genre-summary{display:none;align-items:center;gap:8px;margin-top:8px;padding:8px 12px;background:rgba(82,194,122,0.06);border:1px solid rgba(82,194,122,.2);border-radius:8px;font-size:.78rem;color:var(--green);}
.genre-summary.show{display:flex;}

/* ── 카운터 ── */
.counter-wrap{display:flex;align-items:center;gap:0;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:10px;overflow:hidden;width:fit-content;}
.c-btn{width:44px;height:46px;border:none;cursor:pointer;background:rgba(255,255,255,.06);color:var(--text);font-size:1.3rem;font-family:inherit;transition:background .2s;display:flex;align-items:center;justify-content:center;}
.c-btn:hover{background:rgba(212,168,67,0.2);color:var(--gold);}
.c-val{min-width:70px;text-align:center;font-size:1.6rem;font-weight:700;color:var(--gold);font-family:'Cormorant Garamond',serif;border-left:1px solid rgba(255,255,255,.08);border-right:1px solid rgba(255,255,255,.08);line-height:46px;}

/* ── 막 수 ── */
.act-btns{display:flex;gap:8px;}
.act-btn{flex:1;padding:10px;border-radius:8px;cursor:pointer;text-align:center;font-size:.85rem;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.05);color:var(--sub);transition:all .2s;font-family:inherit;}
.act-btn.on{background:rgba(212,168,67,0.15);border-color:var(--gold);color:var(--gold);font-weight:700;}

/* ── 생성 버튼 ── */
.gen-btn{width:100%;padding:17px;border-radius:12px;cursor:pointer;border:none;background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;letter-spacing:.05em;box-shadow:0 4px 30px rgba(124,58,237,0.4);transition:all .3s;margin-top:8px;}
.gen-btn:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(124,58,237,0.5);}
.gen-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

/* ── 진행 ── */
.prog-card{background:rgba(124,58,237,0.08);border:1px solid rgba(124,58,237,0.25);border-radius:14px;padding:28px;text-align:center;display:none;}
.prog-card.show{display:block;}
.prog-steps{display:flex;flex-direction:column;gap:10px;max-width:400px;margin:16px auto;}
.prog-step{display:flex;align-items:center;gap:12px;padding:10px 16px;border-radius:8px;background:rgba(255,255,255,.04);font-size:.85rem;color:var(--sub);transition:all .4s;}
.prog-step.active{background:rgba(212,168,67,0.1);color:var(--gold);border:1px solid rgba(212,168,67,0.2);}
.prog-step.done{background:rgba(82,194,122,0.08);color:var(--green);}
.sicon{font-size:1rem;width:22px;text-align:center;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── 결과 ── */
.result-wrap{display:none;}
.result-wrap.show{display:block;}
.r-header{text-align:center;padding:20px 0 16px;}
.r-title{font-family:'Cormorant Garamond',serif;font-size:2rem;font-weight:700;color:var(--gold);text-shadow:0 0 20px rgba(212,168,67,0.3);}
.r-sub{font-size:.75rem;color:var(--sub);letter-spacing:.15em;margin-top:6px;}

/* ── 장면 편집 카드 ── */
.scene-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:14px;overflow:hidden;}
.scene-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;transition:background .2s;border-bottom:1px solid transparent;}
.scene-header:hover{background:rgba(255,255,255,.03);}
.scene-header.open{border-bottom-color:rgba(255,255,255,.07);}
.scene-tag{font-size:.68rem;letter-spacing:.2em;text-transform:uppercase;padding:3px 10px;border-radius:10px;font-weight:700;}
.tag-opening{background:rgba(212,168,67,0.15);color:var(--gold);border:1px solid rgba(212,168,67,0.3);}
.tag-scene{background:rgba(93,173,226,0.15);color:var(--blue);border:1px solid rgba(93,173,226,0.3);}
.tag-curtain{background:rgba(199,120,221,0.15);color:var(--pink);border:1px solid rgba(199,120,221,0.3);}
.scene-body{padding:18px;}

/* ── 편집 필드 ── */
.edit-label{font-size:.68rem;color:var(--sub);letter-spacing:.15em;text-transform:uppercase;margin-bottom:6px;margin-top:14px;}
.edit-label:first-child{margin-top:0;}
.edit-box{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:12px;color:var(--text);font-size:.88rem;font-family:'Noto Serif KR',serif;line-height:1.8;width:100%;outline:none;resize:vertical;transition:border-color .2s;min-height:80px;}
.edit-box:focus{border-color:var(--gold);}
.prompt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
@media(max-width:580px){.prompt-grid{grid-template-columns:1fr;}}
.prompt-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:10px 12px;}
.prompt-label{font-size:.65rem;color:var(--pink);letter-spacing:.15em;text-transform:uppercase;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.prompt-text{font-size:.75rem;color:var(--sub);line-height:1.6;font-family:monospace;width:100%;background:none;border:none;color:var(--sub);outline:none;resize:none;font-size:.75rem;line-height:1.6;}

/* ── 저장 상태 ── */
.save-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(82,194,122,0.06);border:1px solid rgba(82,194,122,.2);border-radius:10px;margin-bottom:14px;font-size:.75rem;}
.save-status{display:flex;align-items:center;gap:6px;color:var(--green);}
.save-dot{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── 하단 버튼 ── */
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px;}
.btn-sec{padding:13px 18px;border-radius:10px;cursor:pointer;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.15);color:var(--sub);font-size:.88rem;font-family:inherit;transition:all .2s;}
.btn-sec:hover{background:rgba(255,255,255,.12);color:var(--text);}
.btn-regen{padding:13px 18px;border-radius:10px;cursor:pointer;background:rgba(124,58,237,0.15);border:1px solid rgba(124,58,237,0.3);color:var(--pink);font-size:.88rem;font-family:inherit;}
.btn-slide{flex:2;padding:15px;border-radius:10px;cursor:pointer;border:none;background:linear-gradient(135deg,var(--pink),var(--purple));color:#fff;font-weight:800;font-size:1rem;font-family:inherit;box-shadow:0 4px 24px rgba(199,120,221,0.35);}
.btn-dl{flex:1;padding:13px;border-radius:10px;cursor:pointer;border:none;background:linear-gradient(135deg,var(--blue),#1B4F72);color:#fff;font-weight:700;font-size:.88rem;font-family:inherit;}

/* ── 대시보드 ── */
.work-card{background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:14px 16px;margin-bottom:10px;transition:border-color .2s;}
.work-card:hover{border-color:rgba(212,168,67,.25);}
.work-card.approved{border-left:3px solid var(--green);}
.w-title{font-weight:700;font-size:.95rem;color:var(--gold);}
.w-meta{font-size:.68rem;color:rgba(255,255,255,.3);margin-top:3px;}
.w-actions{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px;}
.w-btn{display:flex;align-items:center;gap:5px;padding:5px 10px;border-radius:6px;font-size:.72rem;cursor:pointer;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:rgba(255,255,255,.5);font-family:inherit;transition:all .2s;}
.w-btn:hover{background:rgba(255,255,255,.12);color:var(--text);}
.w-btn.approve-on{border-color:var(--green);color:var(--green);}
.w-btn.danger{border-color:rgba(239,68,68,.3);color:#fca5a5;background:rgba(239,68,68,.08);}
.w-preview{margin-top:10px;padding:12px;background:rgba(0,0,0,.3);border-radius:8px;font-size:.78rem;color:rgba(255,255,255,.55);line-height:1.7;max-height:200px;overflow-y:auto;white-space:pre-wrap;font-family:'Noto Serif KR',serif;display:none;}

/* ── 변경 비밀번호 ── */
.chpw-form{display:flex;flex-direction:column;gap:8px;}

/* ── 스크롤바 ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(212,168,67,.25);border-radius:2px;}

.fade-in{animation:fadeIn .35s ease-out;}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#toast{position:fixed;bottom:20px;right:20px;z-index:9999;padding:10px 18px;border-radius:10px;font-size:.82rem;background:rgba(82,194,122,0.9);color:#000;display:none;pointer-events:none;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
@media(max-width:580px){.row2{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div id="root"></div>
<div id="toast"></div>

<script>
'use strict';

// ── 상수 ──
const LS = {
  get:(k,d=null)=>{try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):d;}catch{return d;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};
const TEACHER_PW = 'mm_teacher_pw';
const TEACHER_API = 'mm_teacher_api';
const CLASS_ON = 'mm_class_on';
const WORKS_KEY = 'mm_works';
const SESSION = 'mm_session';
const DRAFT_KEY = 'mm_draft';

const BG_GENRES = ['🏫 학교','🏠 가정','🌿 자연·환경','🏯 역사','🚀 우주·미래','🏙️ 도시','🌊 바다·섬','🧚 마법세계'];
const MOOD_GENRES = ['✨ 판타지','🤝 우정','🌱 성장','😄 코미디','🗺️ 모험','💛 사랑·가족','🔍 미스터리','💪 도전·극복'];
const DURATIONS = [{id:2,label:'2막'},{id:3,label:'3막'},{id:4,label:'4막'},{id:5,label:'5막'}];

// ── 앱 상태 ──
let session = LS.get(SESSION); // 'teacher'|'student'|null
let classOn = LS.get(CLASS_ON, false);
let teacherApi = LS.get(TEACHER_API, '');
let works = LS.get(WORKS_KEY, []);
let studentName = '';
let dashTab = 'settings';

// 학생 입력 상태
let bgGenre = '', moodGenre = '', castCount = 5, actCount = 3;
let generatedData = null;
let autoSaveTimer = null;
let openScenes = {};

const root = document.getElementById('root');

// ── 렌더 라우터 ──
function render() {
  if (!session) { renderLogin(); return; }
  if (session === 'teacher') { renderTeacher(); return; }
  renderStudent();
}

// ══════════════════════════
// 로그인
// ══════════════════════════
function renderLogin(tab='teacher') {
  const pwSet = !!LS.get(TEACHER_PW);
  root.innerHTML = `
  <div class="login-wrap fade-in">
    <div class="login-box">
      <div class="login-logo">🎭 EAIM</div>
      <div class="login-sub">MUSICAL MAKER</div>
      <div class="login-tabs">
        <button class="login-tab ${tab==='teacher'?'on':''}" onclick="renderLogin('teacher')">🎓 선생님</button>
        <button class="login-tab ${tab==='student'?'on':''}" onclick="renderLogin('student')">🎒 학생</button>
      </div>
      ${tab==='teacher' ? `
        <div class="field-label">${pwSet?'비밀번호':'비밀번호 설정 (최초 1회)'}</div>
        <input class="t-input" type="password" id="pw-input" placeholder="${pwSet?'비밀번호 입력':'새 비밀번호 (4자 이상)'}" onkeydown="if(event.key==='Enter')doLogin('teacher')">
      ` : `
        ${!classOn?`<div class="notice-box"><div style="font-size:1.5rem;margin-bottom:4px">🔒</div><div style="font-size:.82rem;color:#fca5a5">선생님이 아직 수업을 열지 않았어요</div></div>`:''}
        <div class="field-label">이름</div>
        <input class="t-input" type="text" id="sname-input" placeholder="이름 입력" onkeydown="if(event.key==='Enter')doLogin('student')">
      `}
      <div class="err-msg" id="login-err"></div>
      <button class="main-btn" onclick="doLogin('${tab}')" ${tab==='student'&&!classOn?'disabled':''}>
        ${tab==='teacher'?(pwSet?'로그인':'시작하기'):'입장하기'}
      </button>
    </div>
  </div>`;
}

function doLogin(tab) {
  const err = document.getElementById('login-err');
  if (tab === 'teacher') {
    const pw = document.getElementById('pw-input').value;
    const stored = LS.get(TEACHER_PW);
    if (!stored) {
      if (pw.length < 4) { err.textContent = '비밀번호는 4자 이상이어야 해요'; return; }
      LS.set(TEACHER_PW, pw);
    } else {
      if (pw !== stored) { err.textContent = '비밀번호가 틀렸어요'; return; }
    }
    session = 'teacher'; LS.set(SESSION, 'teacher');
  } else {
    const name = document.getElementById('sname-input')?.value.trim();
    if (!name) { err.textContent = '이름을 입력해주세요'; return; }

  a.download = `${w.title||'뮤지컬'}_${w.student}.txt`;
  a.click();
}

// ══════════════════════════
// Gemini 호출
// ══════════════════════════
async function callGemini(prompt) {
  const key = LS.get(TEACHER_API,'');
  if (!key) throw new Error('API 키가 설정되지 않았어요. 선생님께 문의하세요.');
  const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key.trim()}`;
  const res = await fetch(url, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.9, maxOutputTokens:4000}})
  });
  if (!res.ok) { const e=await res.json().catch(()=>({})); throw new Error(e?.error?.message||`오류 ${res.status}`); }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text||'';
}
function parseJSON(text) {
  const c = text.replace(/```json\n?/g,'').replace(/```\n?/g,'').trim();
  return JSON.parse(c);
}

// ══════════════════════════
// 대본 생성
// ══════════════════════════
async function startGenerate() {
  const theme = document.getElementById('theme')?.value.trim();
  const setting = document.getElementById('setting')?.value.trim()||'현대';
  const err = document.getElementById('s-err');
  if (!theme) { err.textContent='주제를 입력해주세요!'; return; }
  if (!bgGenre) { err.textContent='배경 장르를 선택해주세요!'; return; }
  if (!moodGenre) { err.textContent='분위기 장르를 선택해주세요!'; return; }
  err.textContent='';

  const genre = `${bgGenre} + ${moodGenre}`;
  const main = document.getElementById('student-main');
  main.innerHTML = `
  <div class="prog-card show">
    <div style="font-family:'Cormorant Garamond',serif;font-size:1.3rem;color:var(--gold);margin-bottom:4px">🎭 뮤지컬을 만들고 있어요...</div>
    <div style="font-size:.72rem;color:var(--sub);margin-bottom:0">잠시만 기다려주세요</div>
    <div class="prog-steps">
      <div class="prog-step" id="ps-1"><span class="sicon">🎬</span>제목 & 전체 구성 설계</div>
      <div class="prog-step" id="ps-2"><span class="sicon">🌅</span>오프닝 코러스 작성</div>
      <div class="prog-step" id="ps-3"><span class="sicon">🎭</span>각 막 장면 작성</div>
      <div class="prog-step" id="ps-4"><span class="sicon">🎪</span>커튼콜 작성</div>
      <div class="prog-step" id="ps-5"><span class="sicon">🎵</span>Suno & 이미지 프롬프트 완성</div>
    </div>
    <div id="prog-msg" style="font-size:.72rem;color:var(--sub);margin-top:8px"></div>
  </div>`;

  const setStep = (n,msg='') => {
    for(let i=1;i<=5;i++){
      const el=document.getElementById(`ps-${i}`);
      if(!el)return;
      if(i<n){el.className='prog-step done';el.querySelector('.sicon').textContent='✓';}
      else if(i===n){el.className='prog-step active';}
      else{el.className='prog-step';}
    }
    const pm=document.getElementById('prog-msg');
    if(pm)pm.textContent=msg;
  };

  try {
    setStep(1,'전체 구성 설계 중...');
    const s1 = await callGemini(`창작 뮤지컬 작가로서 아래 정보로 전체 구조를 설계하세요.
주제: ${theme} | 장르: ${genre} | 등장인물: ${castCount}명 | 배경: ${setting} | 막 수: ${actCount}

JSON만 응답:
{"title":"뮤지컬 제목","characters":["이름(역할)" ${castCount}명 배열],"synopsis":"줄거리 2-3문장","acts":[{"actNum":1,"title":"막제목","summary":"내용 1문장","emotion":"감정"}]}`);
    const struct = parseJSON(s1);
    const charsStr = struct.characters.join(', ');

    setStep(2,'오프닝 코러스 작성 중...');
    const s2 = await callGemini(`뮤지컬 "${struct.title}" 오프닝 코러스.
줄거리:${struct.synopsis} | 인물:${charsStr} | 장르:${genre}
JSON만:{"songTitle":"넘버제목","lyrics":"가사 4-6줄(줄바꿈)","sunoPrompt":"영문 Suno 프롬프트(50단어이내)","bgPrompt":"영문 배경이미지 프롬프트(--ar 16:9포함)","mood":"분위기 한국어"}`);
    const opening = parseJSON(s2);

    setStep(3,'장면 작성 중...');
    const scenes = [];
    for(const act of struct.acts){
      setStep(3,`${act.actNum}막 "${act.title}" 작성 중...`);
      const sn = await callGemini(`뮤지컬 "${struct.title}" ${act.actNum}막.
내용:${act.summary} | 감정:${act.emotion} | 인물:${charsStr}
JSON만:{"sceneTitle":"${act.title}","songTitle":"넘버제목","lyrics":"가사 4-6줄","characters":"등장인물","sunoPrompt":"영문 Suno(50단어이내)","bgPrompt":"영문 배경이미지(--ar 16:9)","emotion":"${act.emotion}","mood":"분위기 한국어"}`);
      scenes.push(parseJSON(sn));
    }

    setStep(4,'커튼콜 작성 중...');
    const s4 = await callGemini(`뮤지컬 "${struct.title}" 커튼콜.
오프닝가사:${opening.lyrics} | 줄거리:${struct.synopsis}
JSON만:{"songTitle":"커튼콜 제목(Reprise가능)","lyrics":"가사 4-6줄(감동적 마무리)","sunoPrompt":"영문 Suno(emotional finale,50단어이내)","bgPrompt":"영문 배경이미지(grand finale,all cast,--ar 16:9)","mood":"분위기 한국어"}`);
    const curtain = parseJSON(s4);

    setStep(5,'완성 정리 중...');
    generatedData = { title:struct.title, genre, characters:struct.characters, synopsis:struct.synopsis, setting, opening, scenes, curtain };

    // 자동저장
    LS.set(DRAFT_KEY, generatedData);
    // 결과물 저장
    saveWork(generatedData);

    await new Promise(r=>setTimeout(r,500));
    renderResult();

  } catch(e) {
    main.innerHTML = `
    <div class="card" style="text-align:center;padding:32px">
      <div style="font-size:1.2rem;color:#fca5a5;margin-bottom:12px">⚠️ 생성 실패</div>
      <div style="font-size:.82rem;color:var(--sub);margin-bottom:20px">${e.message}</div>
      <button class="btn-sec" onclick="renderStudentInput()">← 돌아가기</button>
    </div>`;
  }
}

// ══════════════════════════
// 결과물 저장
// ══════════════════════════
function saveWork(d) {
  const fullText = buildFullText(d);
  const work = {
    id: Date.now(),
    student: studentName||'익명',
    title: d.title,
    genre: d.genre,
    acts: actCount,
    cast: castCount,
    time: new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}),
    approved: false,
    preview: `${d.synopsis}\n\n♪ ${d.opening.songTitle}\n${d.opening.lyrics}`,
    fullText,
  };
  works = [work, ...works];
  LS.set(WORKS_KEY, works);
}

function buildFullText(d) {
  if (!d) return '';
  let t = `${'═'.repeat(48)}\n  ${(d.title||'').toUpperCase()}\n  ${d.genre}\n${'═'.repeat(48)}\n\n`;
  t += `📖 줄거리\n${d.synopsis}\n\n`;
  t += `👥 등장인물\n  ${(d.characters||[]).join('\n  ')}\n\n`;
  t += `【 오프닝 코러스 】\n${'─'.repeat(36)}\n♪ ${d.opening.songTitle}\n\n${d.opening.lyrics}\n\n[Suno] ${d.opening.sunoPrompt}\n[BG] ${d.opening.bgPrompt}\n\n`;
  (d.scenes||[]).forEach((s,i)=>{
    t += `【 ${i+1}막: ${s.sceneTitle} 】\n${'─'.repeat(36)}\n등장: ${s.characters}\n♪ ${s.songTitle}\n\n${s.lyrics}\n\n[Suno] ${s.sunoPrompt}\n[BG] ${s.bgPrompt}\n\n`;
  });
  t += `【 커튼콜 】\n${'─'.repeat(36)}\n♪ ${d.curtain.songTitle}\n\n${d.curtain.lyrics}\n\n[Suno] ${d.curtain.sunoPrompt}\n[BG] ${d.curtain.bgPrompt}`;
  return t;
}

// ══════════════════════════
// 결과 화면 (장면별 편집)
// ══════════════════════════
function renderResult() {
  const main = document.getElementById('student-main');
  if (!main || !generatedData) return;
  const d = generatedData;

  main.innerHTML = `
  <!-- 저장 상태바 -->
  <div class="save-bar">
    <div class="save-status"><div class="save-dot"></div>자동저장 완료</div>
    <div style="font-size:.68rem;color:var(--sub)">수정하면 자동으로 저장됩니다</div>
  </div>

  <!-- 제목 -->
  <div class="r-header">
    <div style="font-size:.62rem;color:var(--sub);letter-spacing:.25em;margin-bottom:6px">✦ EAIM MUSICAL ✦</div>
    <div class="r-title">${d.title}</div>
    <div class="r-sub">${d.genre} · ${actCount}막 · 등장인물 ${castCount}명</div>
  </div>

  <!-- 등장인물 -->
  <div class="card" style="margin-bottom:14px">
    <div class="card-title" style="margin-bottom:10px">👥 등장인물</div>
    <div style="font-size:.82rem;color:rgba(255,255,255,.6);line-height:2">${(d.characters||[]).map(c=>`• ${c}`).join('<br>')}</div>
  </div>

  <!-- 오프닝 -->
  ${renderSceneCard('opening', '오프닝 코러스', 'tag-opening', '🌅', d.opening, -1)}

  <!-- 각 막 -->
  ${(d.scenes||[]).map((s,i)=>renderSceneCard(`scene-${i}`, `${i+1}막 — ${s.sceneTitle}`, 'tag-scene', '🎬', s, i)).join('')}

  <!-- 커튼콜 -->
  ${renderSceneCard('curtain', '커튼콜', 'tag-curtain', '🎭', d.curtain, -2)}

  <!-- 하단 버튼 -->
  <div class="btn-row">
    <button class="btn-sec" onclick="renderStudentInput()">↩ 새로 만들기</button>
    <button class="btn-regen" onclick="startGenerate()">🔄 재생성</button>
    <button class="btn-dl" onclick="downloadAll()">📥 다운로드</button>
    <button class="btn-slide" onclick="launchSlideshow()">🎬 슬라이드쇼</button>
  </div>`;

  // 편집 이벤트 — 자동저장
  main.querySelectorAll('textarea, .prompt-text').forEach(el=>{
    el.addEventListener('input', ()=>{ scheduleAutoSave(); });
  });
}

function renderSceneCard(id, label, tagClass, icon, data, idx) {
  return `
  <div class="scene-card">
    <div class="scene-header open" onclick="toggleScene('${id}')">
      <div style="display:flex;align-items:center;gap:10px">
        <span class="scene-tag ${tagClass}">${icon} ${label}</span>
        <span style="font-size:.85rem;font-weight:700;color:var(--text)">♪ ${data.songTitle||''}</span>
      </div>
      <span style="color:rgba(255,255,255,.25);font-size:.72rem" id="arr-${id}">▲</span>
    </div>
    <div class="scene-body" id="body-${id}">
      <div class="edit-label">가사</div>
      <textarea class="edit-box" id="lyrics-${id}" rows="6" data-field="lyrics" data-idx="${idx}">${data.lyrics||''}</textarea>
      <div class="prompt-grid">
        <div class="prompt-box">
          <div class="prompt-label">🎵 Suno 프롬프트 <button class="w-btn" style="float:right;margin-top:-2px" onclick="copyEl('suno-${id}')">복사</button></div>
          <textarea class="prompt-text" id="suno-${id}" rows="3" data-field="suno" data-idx="${idx}">${data.sunoPrompt||''}</textarea>
        </div>
        <div class="prompt-box">
          <div class="prompt-label">🖼 배경 프롬프트 <button class="w-btn" style="float:right;margin-top:-2px" onclick="copyEl('bg-${id}')">복사</button></div>
          <textarea class="prompt-text" id="bg-${id}" rows="3" data-field="bg" data-idx="${idx}">${data.bgPrompt||''}</textarea>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleScene(id) {
  const body = document.getElementById(`body-${id}`);
  const arr = document.getElementById(`arr-${id}`);
  if (!body) return;
  const isOpen = body.style.display!=='none';
  body.style.display = isOpen?'none':'block';
  if(arr) arr.textContent = isOpen?'▼':'▲';
}

// ── 자동저장 ──
function scheduleAutoSave() {
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(()=>{
    collectEdits();
    LS.set(DRAFT_KEY, generatedData);
    // 결과물 업데이트
    const last = works[0];
    if (last) {
      last.fullText = buildFullText(generatedData);
      last.preview = `${generatedData.synopsis}\n\n♪ ${generatedData.opening.songTitle}\n${generatedData.opening.lyrics}`;
      LS.set(WORKS_KEY, works);
    }
    showToast('💾 자동저장 완료');
  }, 1500);
}

function collectEdits() {
  if (!generatedData) return;
  const getVal = id => document.getElementById(id)?.value || '';
  generatedData.opening.lyrics = getVal('lyrics-opening');
  generatedData.opening.sunoPrompt = getVal('suno-opening');
  generatedData.opening.bgPrompt = getVal('bg-opening');
  (generatedData.scenes||[]).forEach((_,i)=>{
    generatedData.scenes[i].lyrics = getVal(`lyrics-scene-${i}`);
    generatedData.scenes[i].sunoPrompt = getVal(`suno-scene-${i}`);
    generatedData.scenes[i].bgPrompt = getVal(`bg-scene-${i}`);
  });
  generatedData.curtain.lyrics = getVal('lyrics-curtain');
  generatedData.curtain.sunoPrompt = getVal('suno-curtain');
  generatedData.curtain.bgPrompt = getVal('bg-curtain');
}

// ── 다운로드 ──
function downloadAll() {
  collectEdits();
  const text = buildFullText(generatedData);
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([text],{type:'text/plain;charset=utf-8'}));
  a.download = `${generatedData?.title||'뮤지컬'}_${studentName||'학생'}.txt`;
  a.click();
}

// ── 슬라이드쇼 연동 ──
function launchSlideshow() {
  collectEdits();
  const d = generatedData; if (!d) return;
  const scenes = [
    { type:'opening', title:'오프닝 코러스', songTitle:d.opening.songTitle, lyrics:d.opening.lyrics, imagePrompt:d.opening.bgPrompt, characters:(d.characters||[]).join(', '), emotion:'설렘', musicMood:d.opening.mood },
    ...(d.scenes||[]).map(s=>({ title:s.sceneTitle, songTitle:s.songTitle, lyrics:s.lyrics, imagePrompt:s.bgPrompt, characters:s.characters, emotion:s.emotion, musicMood:s.mood })),
  ];
  localStorage.setItem('eaim_musical_data', JSON.stringify({ title:d.title, scenes, curtainSongTitle:d.curtain.songTitle, curtainLyrics:d.curtain.lyrics, credits:[] }));
  window.open('slideshow.html','_blank');
  showToast('🎬 슬라이드쇼로 전송!');
}

// ── 유틸 ──
function copyEl(id) {
  const el = document.getElementById(id);
  if (!el) return;
  navigator.clipboard.writeText(el.value||el.textContent).then(()=>showToast('✅ 복사됨!'));
}
let toastT;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent=msg; el.style.display='block';
  clearTimeout(toastT); toastT=setTimeout(()=>{ el.style.display='none'; },2000);
}
function logout() {
  session=null; LS.set(SESSION,null); render();
}

// ── 시작 ──
render();
</script>
</body>
</html>
